name: Build and Deploy Frontend

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Extract metadata (tags, labels)
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: bhusalsaurav0/landing-page-frontend
        tags: |
          type=sha,prefix=sha-
          type=raw,value=latest, enable={{is_default_branch}}
          type=ref,event=branch
          type=ref,event=pr


    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        build-args: |
          NEXT_PUBLIC_API_URL=https://api.lakhey.tech
        cache-from: type=registry,ref=bhusalsaurav0/landing-page-frontend:buildcache
        cache-to: type=registry,ref=bhusalsaurav0/landing-page-frontend:buildcache,mode=max

  deploy-to-ec2:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Deploy to EC2 via SSH
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          docker pull bhusalsaurav0/landing-page-frontend:latest
          docker stop landing-page-frontend 2>/dev/null || true
          docker rm landing-page-frontend 2>/dev/null || true
          docker run -d --name landing-page-frontend --restart unless-stopped -p 127.0.0.1:3000:3000 -e NEXT_PUBLIC_API_URL=https://api.lakhey.tech bhusalsaurav0/landing-page-frontend:latest
          docker image prune -af --filter "until=24h"
          echo "Frontend deployment complete!"
        
